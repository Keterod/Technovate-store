name: flutter_firebase
description: "TECHNOVATE - Tienda de productos electrónicos"
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^2.27.0
  cloud_firestore: ^4.15.8
  firebase_auth: ^4.16.0
  firebase_database: ^10.4.9
  google_maps_flutter: ^2.12.1
  geolocator: ^13.0.4
  http: ^1.4.0
  url_launcher: ^6.3.1
  speech_to_text: ^7.0.0
  google_sign_in: ^6.3.0
  cached_network_image: ^3.4.0
  google_fonts: ^6.3.0
  shimmer: ^3.0.0
  go_router: ^12.1.0
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/technovate_logo.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/technovate_logo.png"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
