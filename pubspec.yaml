name: flutter_firebase
description: "TECHNOVATE - Tienda de productos electrónicos"
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^4.10.0
  cloud_firestore: ^6.5.0
  firebase_database: ^12.4.2
  google_maps_flutter: ^2.12.1
  geolocator: ^13.0.4
  http: ^1.4.0
  url_launcher: ^6.3.1
  firebase_ai: ^3.12.2
  firebase_app_check: ^0.4.4+2
  firebase_auth: ^6.5.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/technovate_logo.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/technovate_logo.png"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
